kind = "web"
previewPath = "/"
title = "Fintech Dashboard"
version = "1.0.0"
id = "artifacts/fintech-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25820

[services.development]
run = "pnpm --filter @workspace/fintech-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fintech-dashboard", "run", "build" ]
publicDir = "artifacts/fintech-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25820"
BASE_PATH = "/"
